name: Migrate Repo Major Version

# Manual-only. Implements spec/14-update/26-repo-major-version-migrator.md.
# Rewrites every qualified `owner/repo-vNN` slug across the repo, bumps
# package.json to the new major, runs the sync chain, and opens a PR.
#
# NEVER triggers on push, PR, or schedule. Human-initiated only.

on:
  workflow_dispatch:
    inputs:
      from:
        description: "Old repo slug (owner/repo, e.g. alimtvnetwork/coding-guidelines-v15)"
        required: true
        type: string
      to:
        description: "New repo slug (owner/repo, e.g. alimtvnetwork/coding-guidelines-v16)"
        required: true
        type: string
      new_version:
        description: "New package.json version (must be a major bump, e.g. 4.0.0)"
        required: true
        type: string
      confirm:
        description: "Set true to actually write files. Otherwise dry-run."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run migrator (dry-run)
        if: ${{ inputs.confirm != 'true' }}
        run: |
          node scripts/migrate-repo-major-version.mjs \
            --from "${{ inputs.from }}" \
            --to "${{ inputs.to }}" \
            --new-version "${{ inputs.new_version }}"

      - name: Run migrator (confirm)
        if: ${{ inputs.confirm == 'true' }}
        run: |
          node scripts/migrate-repo-major-version.mjs \
            --from "${{ inputs.from }}" \
            --to "${{ inputs.to }}" \
            --new-version "${{ inputs.new_version }}" \
            --confirm

      - name: Create Pull Request
        if: ${{ inputs.confirm == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: migrate ${{ inputs.from }} -> ${{ inputs.to }} (v${{ inputs.new_version }})"
          title: "chore: migrate ${{ inputs.from }} -> ${{ inputs.to }} (v${{ inputs.new_version }})"
          body: |
            Automated migration generated by `.github/workflows/migrate-repo-version.yml`.

            - From: `${{ inputs.from }}`
            - To:   `${{ inputs.to }}`
            - New version: `${{ inputs.new_version }}`

            Per spec `spec/14-update/26-repo-major-version-migrator.md`.
            Review the diff carefully before merging. Do not auto-merge.
          branch: "chore/migrate-${{ inputs.new_version }}"
          delete-branch: true
